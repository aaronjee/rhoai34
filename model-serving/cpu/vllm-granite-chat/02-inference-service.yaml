apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: granite-chat
  namespace: rhel-ai-chat
  labels:
    opendatahub.io/dashboard: 'true'
  annotations:
    openshift.io/display-name: "IBM Granite 3.0 2B Chat"
    serving.kserve.io/deploymentMode: RawDeployment
spec:
  predictor:
    model:
      modelFormat:
        name: vLLM
      runtime: vllm-cpu-x86-runtime
      storage:
        key: huggingface
        path: ibm-granite/granite-3.0-2b-instruct
      resources:
        requests:
          cpu: '2'
          memory: 6Gi
        limits:
          cpu: '4'
          memory: 12Gi
