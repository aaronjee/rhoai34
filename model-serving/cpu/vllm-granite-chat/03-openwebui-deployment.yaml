apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: rhel-ai-chat
  labels:
    app: openwebui
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
        component: frontend
    spec:
      containers:
      - name: openwebui
        image: ghcr.io/open-webui/open-webui:main
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: WEBUI_AUTH
          value: "false"
        - name: OPENAI_API_BASE_URL
          value: "http://granite-chat-predictor.rhel-ai-chat.svc.cluster.local:8080/v1"
        - name: OPENAI_API_KEY
          value: "sk-dummy-key"
        - name: WEBUI_NAME
          value: "OpenShift AI Chat"
        - name: DEFAULT_MODELS
          value: "granite-chat"
        - name: WEBUI_SECRET_KEY
          value: "3kgrYRfMI5pYjLDNwb53wT-GZMQ30tKkzlBz_Nfw8aU="
        - name: DATA_DIR
          value: "/tmp/data"
        - name: STATIC_DIR
          value: "/tmp/static"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false  # Open WebUI needs write access
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /tmp/data
        - name: static
          mountPath: /tmp/static
      volumes:
      - name: data
        emptyDir: {}
      - name: static
        emptyDir: {}
      restartPolicy: Always