apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: rhel-ai-chat
  labels:
    app: openwebui
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
        component: frontend
    spec:
      containers:
      - name: openwebui
        image: ghcr.io/open-webui/open-webui:main
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: WEBUI_AUTH
          value: "false"
        - name: OPENAI_API_BASE_URL
          value: "http://granite-chat-predictor.rhel-ai-chat.svc.cluster.local:8080/v1"
        - name: OPENAI_API_KEY
          value: "sk-dummy-key"
        - name: WEBUI_NAME
          value: "OpenShift AI Chat"
        - name: DEFAULT_MODELS
          value: "granite-chat"
        - name: WEBUI_SECRET_KEY
          value: "openshift-ai-secret-key-change-in-production"
        - name: DATA_DIR
          value: "/tmp/data"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false  # Open WebUI needs write access
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: data
          mountPath: /tmp/data
      volumes:
      - name: data
        emptyDir: {}
      restartPolicy: Always