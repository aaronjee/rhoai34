apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: rhel-ai-chat
  labels:
    app: openwebui
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
        component: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: openwebui
        image: ghcr.io/open-webui/open-webui:main
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: WEBUI_AUTH
          value: "false"
        - name: OPENAI_API_BASE_URL
          value: "http://vllm-cpu-service:8000/v1"
        - name: OPENAI_API_KEY
          value: "sk-dummy-key"
        - name: WEBUI_NAME
          value: "OpenShift AI Chat"
        - name: DEFAULT_MODELS
          value: "ibm-granite/granite-3.0-2b-instruct"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false  # Open WebUI needs write access
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: data
          mountPath: /app/backend/data
        - name: tmp
          mountPath: /tmp
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: data
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      restartPolicy: Always