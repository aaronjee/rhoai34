apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vllm-openwebui-policy
  namespace: rhel-ai-chat
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: openshift-ingress
    - podSelector:
        matchLabels:
          app: openwebui
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 8080
  - from:
    - podSelector:
        matchLabels:
          app: vllm-cpu-server
    - podSelector:
        matchLabels:
          app: openwebui
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: vllm-cpu-server
    ports:
    - protocol: TCP
      port: 8000
  - to:
    - podSelector:
        matchLabels:
          app: openwebui
    ports:
    - protocol: TCP
      port: 8080
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
  - to:
    - namespaceSelector:
        matchLabels:
          name: openshift-dns
    ports:
    - protocol: TCP
      port: 5353
    - protocol: UDP
      port: 5353