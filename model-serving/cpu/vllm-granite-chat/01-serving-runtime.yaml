apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  annotations:
    opendatahub.io/runtime-version: v0.18.0
    openshift.io/display-name: vLLM CPU (x86) ServingRuntime for KServe
  labels:
    opendatahub.io/dashboard: 'true'
  name: vllm-cpu-x86-runtime
  namespace: rhel-ai-chat
spec:
  annotations:
    opendatahub.io/kserve-runtime: vllm
    prometheus.io/path: /metrics
    prometheus.io/port: '8080'
  containers:
    - args:
        - '--port=8080'
        - '--model=/mnt/models'
        - '--served-model-name={{.Name}}'
        - '--device=cpu'
        - '--chat-template=template_chatml'
        - '--max-model-len=8192'
      command:
        - python
        - '-m'
        - vllm.entrypoints.openai.api_server
      env:
        - name: HF_HOME
          value: /tmp/hf_home
        - name: VLLM_CPU_KVCACHE_SPACE
          value: '4'
        - name: OMP_NUM_THREADS
          value: '4'
        - name: TOKENIZERS_PARALLELISM
          value: 'false'
      image: 'registry.redhat.io/rhaii/vllm-cpu-rhel9:3.4.1-1780356811'
      name: kserve-container
      ports:
        - containerPort: 8080
          protocol: TCP
      resources:
        requests:
          cpu: '2'
          memory: 6Gi
        limits:
          cpu: '4'
          memory: 12Gi
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: vLLM
